<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東京建築巡礼 · 受保护</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:#ece7dd;
  color:#241f1c;
  -webkit-font-smoothing:antialiased;
}
.gate{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;position:relative;overflow:hidden;
}
.gate::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(36,31,28,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(36,31,28,.04) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;
}
.box{
  position:relative;width:100%;max-width:400px;
  background:#faf7f1;border:1px solid rgba(36,31,28,.14);
  border-radius:16px;padding:40px 36px;
  box-shadow:0 8px 40px rgba(0,0,0,.1);
}
.eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.22em;
  color:#c1432e;text-transform:uppercase;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.eyebrow::before{content:'';width:24px;height:1px;background:#c1432e;}
h1{font-family:'Shippori Mincho',serif;font-size:30px;font-weight:800;line-height:1.15;}
.jp{font-size:13px;color:#5a534c;margin-top:10px;line-height:1.6;}
.lock{font-size:13px;color:#5a534c;margin:24px 0 8px;display:flex;align-items:center;gap:8px;}
form{margin-top:6px;}
input[type=password]{
  width:100%;padding:14px 16px;font-size:16px;
  border:1.5px solid rgba(36,31,28,.2);border-radius:10px;
  background:#fff;font-family:'JetBrains Mono',monospace;
  transition:border-color .2s;
}
input[type=password]:focus{outline:none;border-color:#c1432e;}
button{
  width:100%;margin-top:14px;padding:14px;font-size:14px;font-weight:600;
  background:#241f1c;color:#faf7f1;border:none;border-radius:10px;
  cursor:pointer;transition:background .2s;font-family:'Noto Sans JP',sans-serif;
}
button:hover{background:#c1432e;}
button:disabled{opacity:.5;cursor:wait;}
.err{
  margin-top:14px;font-size:12.5px;color:#b23a26;
  background:rgba(193,67,46,.1);border-left:3px solid #c1432e;
  padding:10px 12px;border-radius:8px;display:none;line-height:1.5;
}
.err.show{display:block;}
.hint{
  margin-top:20px;padding-top:18px;border-top:1px dashed rgba(36,31,28,.14);
  font-size:10.5px;color:#5a534c;line-height:1.7;font-family:'JetBrains Mono',monospace;
}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="box">
    <div class="eyebrow">TOKYO ITINERARY · PROTECTED</div>
    <h1>建築巡礼</h1>
    <div class="jp">这是一份受密码保护的东京 5 日行程导航。请输入密码查看完整地图与路线。</div>
    <div class="lock">🔒 内容已加密 (AES-GCM)</div>
    <form id="form" autocomplete="off">
      <input type="password" id="pw" placeholder="输入密码 / Enter password" autofocus>
      <button type="submit" id="btn">解锁查看 · Unlock</button>
    </form>
    <div class="err" id="err"></div>
    <div class="hint">PBKDF2-SHA256 · 250,000 iterations<br>内容在本地浏览器解密，不经过任何服务器</div>
  </div>
</div>

const b64ToBytes = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

async function deriveKey(password, salt, iterations){
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), {name:'PBKDF2'}, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:salt, iterations:iterations, hash:'SHA-256'},
    keyMaterial,
    {name:'AES-GCM', length:256},
    false,
    ['decrypt']
  );
}

async function attemptDecrypt(password){
  const salt = b64ToBytes(PAYLOAD.salt);
  const iv = b64ToBytes(PAYLOAD.iv);
  const ct = b64ToBytes(PAYLOAD.ct);
  const key = await deriveKey(password, salt, PAYLOAD.iterations);
  const plainBuf = await crypto.subtle.decrypt({name:'AES-GCM', iv:iv}, key, ct);
  return new TextDecoder().decode(plainBuf);
}

function renderDecrypted(html){
  // 用解密出的完整HTML替换整个文档
  document.open();
  document.write(html);
  document.close();
}

const form = document.getElementById('form');
const pwInput = document.getElementById('pw');
const btn = document.getElementById('btn');
const err = document.getElementById('err');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.classList.remove('show');
  btn.disabled = true;
  btn.textContent = '解锁中…';
  try {
    const html = await attemptDecrypt(pwInput.value);
    renderDecrypted(html);
  } catch (ex) {
    err.textContent = '密码错误，无法解密。请重试。 / Wrong password.';
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = '解锁查看 · Unlock';
    pwInput.value = '';
    pwInput.focus();
  }
});
</script>
