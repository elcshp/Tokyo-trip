<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>東京建築巡礼 · 行程导航</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --G:#ff9500; --M:#f62e36; --H:#9c9c93; --C:#00bb85; --Z:#8f76d6;
  --F:#9c5e31; --N:#00ac9b; --TY:#da0442; --IN:#0079c2; --JR:#80c241; --EN:#1d8a4e;
  --d0:#4a6670; --d1:#c1432e; --d2:#cc8b1f; --d3:#2f6fa8; --d4:#7a5495; --d5:#1a8a7a; --dH:#8a6d3b;
  --paper:#ece7dd; --paper2:#e3dccd; --ink:#241f1c; --ink2:#5a534c;
  --card:#faf7f1; --line:rgba(36,31,28,.14);
}

html,body{height:100%;}
body{
  font-family:'Noto Sans JP',sans-serif; background:var(--paper); color:var(--ink);
  -webkit-font-smoothing:antialiased;
}

/* ============================================================
   DESKTOP LAYOUT (default): side-by-side map + panel
   ============================================================ */
.app{display:grid; grid-template-columns:1fr 460px; height:100vh; overflow:hidden;}
.map-wrap{position:relative; background:#dcd7cd;}
#map{width:100%; height:100%; background:#dcd7cd;}

/* day switcher over map (desktop) */
.daybar{
  position:absolute; top:16px; left:16px; right:16px; z-index:600;
  display:grid; grid-template-columns:repeat(7,1fr); gap:6px;
}
.daybar-btn{
  padding:10px 4px; border:none; cursor:pointer; border-radius:10px;
  background:rgba(250,247,241,.92); backdrop-filter:blur(8px);
  box-shadow:0 2px 12px rgba(0,0,0,.1); transition:all .22s;
  font-family:'Shippori Mincho',serif; font-weight:700; position:relative; overflow:hidden;
}
.daybar-btn .dn{font-size:16px; display:block; line-height:1;}
.daybar-btn .dl{font-size:8.5px; letter-spacing:.02em; color:var(--ink2); margin-top:4px; font-family:'JetBrains Mono',monospace; white-space:nowrap;}
.daybar-btn::after{content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:var(--dc); transform:scaleX(0); transition:transform .22s;}
.daybar-btn.active{background:var(--card);}
.daybar-btn.active::after{transform:scaleX(1);}
.daybar-btn.active .dn{color:var(--dc);}
.daybar-btn[data-d="0"]{--dc:var(--d0);} .daybar-btn[data-d="1"]{--dc:var(--d1);}
.daybar-btn[data-d="2"]{--dc:var(--d2);} .daybar-btn[data-d="3"]{--dc:var(--d3);}
.daybar-btn[data-d="4"]{--dc:var(--d4);} .daybar-btn[data-d="5"]{--dc:var(--d5);}
.daybar-btn[data-d="H"]{--dc:var(--dH);}

.maplegend{
  position:absolute; bottom:16px; left:16px; z-index:600;
  background:rgba(250,247,241,.94); backdrop-filter:blur(8px); border-radius:10px;
  padding:13px 15px; box-shadow:0 2px 12px rgba(0,0,0,.1); font-size:11px; max-width:200px;
}
.maplegend .lt{font-family:'Shippori Mincho',serif; font-weight:700; font-size:13px; margin-bottom:9px;}
.maplegend .li{display:flex; align-items:center; gap:8px; margin-bottom:5px; color:var(--ink2);}
.maplegend .ld{width:16px; height:4px; border-radius:2px; flex-shrink:0;}

.pin{
  width:34px; height:34px; border-radius:50% 50% 50% 0; transform:rotate(-45deg);
  border:2.5px solid #fff; box-shadow:0 3px 8px rgba(0,0,0,.3); cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .2s;
}
.pin span{transform:rotate(45deg); color:#fff; font-weight:700; font-size:14px; font-family:'JetBrains Mono',monospace;}
.pin:hover{transform:rotate(-45deg) scale(1.15); z-index:1000;}
.pin.dim{opacity:.4;}

.leaflet-popup-content-wrapper{border-radius:10px;}
.leaflet-popup-content{font-family:'Noto Sans JP',sans-serif !important; font-size:12px !important; margin:10px 12px !important;}
.leaflet-popup-content b{font-family:'Shippori Mincho',serif;}
.leaflet-control-zoom{margin-top:74px !important;}

/* panel (right column, desktop) */
.panel{background:var(--paper2); display:flex; flex-direction:column; height:100vh; overflow:hidden;}
.phead{padding:22px 26px 16px; border-bottom:1px solid var(--line); background:var(--card); flex-shrink:0;}
.phead .eyebrow{
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.2em; color:var(--dc-head);
  text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:10px;
}
.phead .eyebrow::before{content:''; width:24px; height:1px; background:var(--dc-head);}
.phead h1{font-family:'Shippori Mincho',serif; font-size:24px; font-weight:800; line-height:1.25;}
.phead .sub{font-size:12.5px; color:var(--ink2); margin-top:8px; line-height:1.6;}
.phead .daystat{display:flex; gap:18px; margin-top:14px; padding-top:14px; border-top:1px dashed var(--line);}
.phead .daystat .si{font-family:'JetBrains Mono',monospace;}
.phead .daystat .sv{font-size:16px; font-weight:700; color:var(--dc-head);}
.phead .daystat .sl{font-size:9px; color:var(--ink2); letter-spacing:.04em;}

.scroller{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;}
.scroller::-webkit-scrollbar{width:5px;}
.scroller::-webkit-scrollbar-thumb{background:rgba(36,31,28,.2); border-radius:3px;}

.timeline{padding:8px 0 48px;}
.tstop{position:relative; padding:0 26px 0 62px;}
.tstop::before{content:''; position:absolute; left:33px; top:0; bottom:0; width:2px; background:var(--line);}
.tstop:last-child::before{bottom:auto; height:30px;}
.tstop:first-child::before{top:30px;}
.tdot{position:absolute; left:25px; top:22px; width:18px; height:18px; border-radius:50%; background:var(--card); border:3px solid var(--dc-head); z-index:2; transition:all .2s;}
.tstop.active .tdot{background:var(--dc-head); box-shadow:0 0 0 5px rgba(0,0,0,.06); transform:scale(1.15);}

.tcard{margin:14px 0; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px; cursor:pointer; transition:all .22s;}
.tcard:hover{transform:translateX(3px); border-color:var(--dc-head); box-shadow:0 4px 14px rgba(0,0,0,.07);}
.tstop.active .tcard{border-color:var(--dc-head); box-shadow:0 4px 18px rgba(0,0,0,.1);}
.tcard .row1{display:flex; align-items:baseline; justify-content:space-between; gap:10px;}
.tcard .time{font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:700; color:var(--dc-head);}
.openchip{font-size:9.5px; font-weight:600; padding:3px 8px; border-radius:20px; font-family:'JetBrains Mono',monospace; letter-spacing:.02em; flex-shrink:0;}
.openchip.open{background:rgba(26,138,122,.14); color:#0e7c5f;}
.openchip.closed{background:rgba(193,67,46,.14); color:#b23a26;}
.openchip.free{background:rgba(36,31,28,.07); color:var(--ink2);}
.tcard h3{font-family:'Shippori Mincho',serif; font-size:18px; font-weight:700; margin:8px 0 2px; line-height:1.3;}
.tcard .en{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink2);}
.tcard .desc{font-size:12.5px; color:var(--ink2); line-height:1.7; margin-top:8px;}
.tcard .meta{display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;}
.chip{font-size:10.5px; padding:4px 9px; border-radius:6px; display:inline-flex; align-items:center; gap:5px; font-weight:500;}
.chip.addr{background:rgba(36,31,28,.05); color:var(--ink2);}
.chip.price,.chip.ticket{background:rgba(204,139,31,.12); color:#9a6a12; font-weight:600;}
.chip.stn{color:#fff; font-weight:600;}
.warn{margin-top:10px; padding:9px 12px; border-radius:8px; background:rgba(193,67,46,.1); border-left:3px solid #c1432e; font-size:11.5px; color:#a83018; font-weight:500; line-height:1.5;}
.transit{margin-top:12px; padding:12px 14px; border-radius:10px; background:linear-gradient(135deg,rgba(36,31,28,.04),rgba(36,31,28,.02)); border:1px solid var(--line);}
.transit .th{font-size:10px; font-family:'JetBrains Mono',monospace; letter-spacing:.08em; color:var(--ink2); text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; gap:8px;}
.transit .th .next{font-weight:700; color:var(--ink); text-align:right;}
.transit .legs{display:flex; flex-direction:column; gap:8px;}
.leg{display:flex; align-items:center; gap:10px; font-size:11.5px;}
.leg .lineicon{width:24px; height:24px; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:11px; font-family:'JetBrains Mono',monospace;}
.leg .linetext{flex:1; line-height:1.4;}
.leg .linetext b{color:var(--ink);}
.leg .linetext .sub{color:var(--ink2); font-size:10px;}
.transit .summ{margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); display:flex; gap:14px; font-family:'JetBrains Mono',monospace; font-size:11px;}
.transit .summ b{color:var(--ink);}

/* hotels view */
.hotelview{padding:8px 26px 48px;}
.hotel-intro{padding:14px 0 6px; font-size:12.5px; color:var(--ink2); line-height:1.7;}
.hcard{margin:14px 0; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px 20px; transition:all .22s;}
.hcard:hover{border-color:var(--dc-head); box-shadow:0 4px 14px rgba(0,0,0,.07);}
.hcard .hrow{display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap;}
.hcard h3{font-family:'Shippori Mincho',serif; font-size:19px; font-weight:700; line-height:1.3;}
.hcard .harea{font-size:10px; font-family:'JetBrains Mono',monospace; color:#fff; background:var(--dc-head); padding:3px 9px; border-radius:20px; letter-spacing:.03em; flex-shrink:0;}
.hcard .hen{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink2); margin-top:3px;}
.hcard .hmeta{display:flex; flex-wrap:wrap; gap:6px; margin:12px 0;}
.hcard .hnote{font-size:12.5px; color:var(--ink2); line-height:1.75; margin-top:10px;}
.hcard .hsub{display:flex; gap:8px; align-items:flex-start; font-size:11.5px; color:var(--ink2); line-height:1.5; margin-top:8px;}
.hcard .hsub .hicon{flex-shrink:0; font-size:12px;}
.hcard .hsub b{color:var(--ink); font-weight:600; margin-right:6px;}
.hcard.hactive{border-color:var(--dH); box-shadow:0 4px 18px rgba(138,109,59,.18);}
.hotelpin{width:30px; height:30px; border-radius:50%; border:2.5px solid #fff; box-shadow:0 3px 8px rgba(0,0,0,.3); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px;}
.hcard.pick{border-color:var(--dH); background:linear-gradient(135deg,rgba(138,109,59,.05),var(--card));}
.hcard .picktag{display:inline-block; font-size:9.5px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--dH); letter-spacing:.08em; margin-bottom:6px;}

/* ============================================================
   MOBILE LAYOUT: single column, map as collapsible preview
   ============================================================ */
.m-only{display:none;}

@media (max-width:840px){
  body{overflow-y:auto;}
  .app{display:block; height:auto; overflow:visible;}

  /* map becomes a fixed-height preview at top, not half the screen */
  .map-wrap{height:38vh; min-height:260px; position:sticky; top:0; z-index:1;}

  /* daybar: horizontal scroll strip, bigger touch targets */
  .daybar{
    position:absolute; top:auto; bottom:10px; left:10px; right:10px;
    display:flex; gap:7px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none;
  }
  .daybar::-webkit-scrollbar{display:none;}
  .daybar-btn{flex:0 0 auto; min-width:64px; padding:9px 12px; scroll-snap-align:start;}
  .daybar-btn .dn{font-size:15px;}
  .daybar-btn .dl{font-size:9px;}

  .maplegend{display:none;} /* legend redundant on small screens */

  /* panel flows below map as the main scroll */
  .panel{height:auto; overflow:visible; background:var(--paper);}
  .phead{padding:20px 18px 14px;}
  .phead h1{font-size:22px;}
  .phead .sub{font-size:13px;}            /* slightly larger body text on mobile */
  .phead .daystat{gap:14px;}

  .scroller{overflow:visible;}
  .timeline{padding:6px 0 32px;}
  .tstop{padding:0 18px 0 52px;}
  .tstop::before{left:25px;}
  .tdot{left:17px; width:16px; height:16px;}

  /* larger tap-friendly cards & type on phones */
  .tcard{padding:16px; margin:12px 0; border-radius:14px;}
  .tcard:hover{transform:none;}          /* no hover-translate on touch */
  .tcard:active{transform:scale(.99);}
  .tcard .time{font-size:17px;}
  .tcard h3{font-size:19px;}
  .tcard .desc{font-size:13.5px; line-height:1.8;}
  .chip{font-size:11.5px; padding:5px 10px;}
  .leg{font-size:12.5px;}
  .leg .lineicon{width:26px; height:26px; font-size:12px;}
  .transit .th{font-size:11px;}

  .hotelview{padding:6px 18px 36px;}
  .hcard{padding:18px; border-radius:14px;}
  .hcard h3{font-size:20px;}
  .hcard .hnote{font-size:13.5px;}

  .m-only{display:block;}
  .d-only{display:none;}
}

@media (max-width:840px) and (min-width:560px){
  .map-wrap{height:42vh;}
}

button:focus-visible, .tcard:focus-visible{outline:2px solid var(--dc-head,#c1432e); outline-offset:2px;}
@media (prefers-reduced-motion:reduce){*{transition:none !important;}}
</style>
</head>

<script>

function openStatus(s){
  if(s.free) return {cls:'free',txt:'全天开放'};
  if(!s.hours) return null;
  const now=new Date(), dow=now.getDay();
  if(s.closedDays && s.closedDays.includes(dow)) return {cls:'closed',txt:'今日休館'};
  const [oh,ch]=s.hours, h=now.getHours()+now.getMinutes()/60;

let map, currentView=0, layerGroup, activeIdx=null;

function initMap(){
  map=L.map('map',{center:[35.668,139.74],zoom:11,zoomControl:true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap © CARTO',maxZoom:19,subdomains:'abcd'
  }).addTo(map);
  layerGroup=L.layerGroup().addTo(map);
  renderDaybar();
  selectView(0);
}

function renderDaybar(){
  const bar=document.getElementById('daybar');
  let html=DAYS.map(d=>`
    <button class="daybar-btn ${d.id===currentView?'active':''}" data-d="${d.id}" onclick="selectView(${d.id})">
      <span class="dn">${d.id}</span><span class="dl">${d.jp}</span>
    </button>`).join('');
  // 住宿 tab
  html+=`<button class="daybar-btn ${currentView==='H'?'active':''}" data-d="H" onclick="selectView('H')">
      <span class="dn">🛏</span><span class="dl">住宿</span></button>`;
  bar.innerHTML=html;
}

function selectView(v){
  currentView=v; activeIdx=null;
  document.querySelectorAll('.daybar-btn').forEach(b=>b.classList.toggle('active', b.dataset.d==String(v)));
  if(v==='H'){ renderHotels(); renderHotelMap(); }
  else { renderDay(v); renderMap(v); }
  // 切换时面板回到顶部
  const sc=document.querySelector('.scroller'); if(sc) sc.scrollTop=0;
  window.scrollTo({top:0,behavior:'smooth'});
}

function parseCost(c){return (c||'').split('+').reduce((s,p)=>{const d=p.replace(/[^\d]/g,'');return s+(d?parseInt(d):0);},0);}

function renderDay(day){
  const d=DAYS.find(x=>x.id===day);
  const stops=STOPS.filter(s=>s.day===day);
  const dc=DC[day];
  const total=stops.reduce((a,s)=>a+(s.transit?parseCost(s.transit.cost):0),0);
  let html=`
    <div class="phead" style="--dc-head:${dc}">
      <div class="eyebrow">DAY ${d.id} · ${d.jp}</div>
      <h1>${d.title}</h1>
      <div class="sub">${d.sub}</div>
      <div class="daystat">
        <div class="si"><div class="sv">${stops.length}</div><div class="sl">STOPS 站点</div></div>
        <div class="si"><div class="sv">${stops[0].time}</div><div class="sl">START 起点</div></div>
        <div class="si"><div class="sv">¥${total}</div><div class="sl">TRANSIT 当日交通</div></div>
      </div>
    </div>
    <div class="scroller"><div class="timeline" style="--dc-head:${dc}">`;
  stops.forEach((s,i)=>{
    const st=openStatus(s), stnC=LINES[s.stnLine]?LINES[s.stnLine].c:'#666';
    html+=`
      <div class="tstop ${i===activeIdx?'active':''}" id="stop-${i}">
        <div class="tdot"></div>
        <div class="tcard" tabindex="0" onclick="focusStop(${i})">
          <div class="row1"><span class="time">${s.time}</span>${st?`<span class="openchip ${st.cls}">${st.txt}</span>`:''}</div>
          <h3>${s.name}</h3><div class="en">${s.en}</div>
          <div class="desc">${s.desc}</div>
          <div class="meta">
            <span class="chip addr">📍 ${s.addr}</span>
            ${s.stn!=='—'?`<span class="chip stn" style="background:${stnC}">🚇 ${s.stn}</span>`:''}
            ${s.ticket?`<span class="chip ticket">🎫 ${s.ticket}</span>`:''}
            ${s.price?`<span class="chip price">💰 ${s.price}</span>`:''}
          </div>
          ${s.warn?`<div class="warn">${s.warn}</div>`:''}
          ${s.transit?renderTransit(s.transit):''}
        </div>
      </div>`;
  });
  html+=`</div></div>`;
  document.getElementById('panel').innerHTML=html;
}

function renderTransit(t){
  const legs=t.legs.map(leg=>{
    const L_=LINES[leg.line]||LINES.WALK;
    return `<div class="leg"><div class="lineicon" style="background:${L_.c}">${leg.line==='WALK'?'🚶':leg.line}</div>
      <div class="linetext"><b>${L_.name}</b> · ${leg.txt}<br><span class="sub">${leg.sub}</span></div></div>`;
  }).join('');
  return `<div class="transit"><div class="th"><span>↓ 前往下一站</span><span class="next">${t.to}</span></div>
    <div class="legs">${legs}</div>
    <div class="summ"><span>⏱ <b>${t.time}</b></span><span>💳 <b>${t.cost}</b></span></div></div>`;
}

function renderHotels(){
  const dc=DC.H;
  let html=`
    <div class="phead" style="--dc-head:${dc}">
      <div class="eyebrow">WHERE TO STAY · 精选住宿</div>
      <h1>六处设计住宿</h1>
      <div class="sub">建议全程住同一家市区酒店,免去换酒店搬行李。价位约¥1,000-2,000/晚(人民币),均为有设计感的中高端之选,各有不同区域与动线。点卡片可在地图定位,★为综合推荐。</div>
    </div>
    <div class="scroller"><div class="hotelview" style="--dc-head:${dc}">`;
  HOTELS.forEach((h,i)=>{
    const stnC=DC.H;
    html+=`
      <div class="hcard ${h.pick?'pick':''}" tabindex="0" onclick="focusHotel(${i})">
        ${h.pick?`<div class="picktag">★ 综合推荐</div>`:''}
        <div class="hrow"><h3>${h.name}</h3><span class="harea">${h.area}</span></div>
        <div class="hen">${h.en}</div>
        <div class="hmeta">
          <span class="chip price">💰 ${h.price}/晚</span>
          <span class="chip addr">🛏 ${h.room}</span>
          <span class="chip addr">✦ ${h.tier}</span>
        </div>
        <div class="hsub"><span class="hicon">🚇</span><div><b>最近车站</b>${h.stn}</div></div>
        <div class="hsub"><span class="hicon">🏬</span><div><b>周边</b>${h.near}</div></div>
        <div class="hnote">${h.note}</div>
      </div>`;
  });
  html+=`</div></div>`;
  document.getElementById('panel').innerHTML=html;
}

function renderHotelMap(){
  layerGroup.clearLayers();
  const dc=DC.H, coords=[];
  HOTELS.forEach((h,i)=>{
    coords.push([h.lat,h.lng]);
    const icon=L.divIcon({html:`<div class="hotelpin" style="background:${dc}">🛏</div>`,iconSize:[30,30],iconAnchor:[15,30],className:''});
    L.marker([h.lat,h.lng],{icon}).bindPopup(`<b>${h.name}</b><br>🚇 ${h.stn}<br>🏬 ${h.near}<br>💰 ${h.price}/晚`).on('click',()=>focusHotel(i)).addTo(layerGroup);
  });
  const grp=L.featureGroup(layerGroup.getLayers());
  if(grp.getLayers().length) map.fitBounds(grp.getBounds().pad(.25),{maxZoom:13});
}

function focusHotel(i){
  const h=HOTELS[i];
  document.querySelectorAll('.hcard').forEach((c,idx)=>c.classList.toggle('hactive',idx===i));
  map.setView([h.lat,h.lng],15,{animate:true});
  const el=document.querySelectorAll('.hcard')[i];
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

function clearMap(){ layerGroup.clearLayers(); }

function renderMap(day){
  layerGroup.clearLayers();
  const stops=STOPS.filter(s=>s.day===day), dc=DC[day], coords=[];
  stops.forEach((s,i)=>{
    coords.push([s.lat,s.lng]);
    const icon=L.divIcon({html:`<div class="pin ${activeIdx!==null&&activeIdx!==i?'dim':''}" style="background:${dc}"><span>${i+1}</span></div>`,iconSize:[34,34],iconAnchor:[17,34],className:''});
    L.marker([s.lat,s.lng],{icon}).bindPopup(`<b>${s.time} · ${s.name}</b><br>📍 ${s.addr}${s.stn!=='—'?'<br>🚇 '+s.stn:''}`).on('click',()=>focusStop(i)).addTo(layerGroup);
  });
  if(coords.length>1) L.polyline(coords,{color:dc,weight:3,opacity:.65,dashArray:'2,8',lineCap:'round'}).addTo(layerGroup);
  const grp=L.featureGroup(layerGroup.getLayers());
  if(grp.getLayers().length) map.fitBounds(grp.getBounds().pad(.2),{maxZoom:14});
}

function focusStop(i){
  if(currentView==='H') return;
  activeIdx=i;
  const s=STOPS.filter(x=>x.day===currentView)[i];
  renderDay(currentView); renderMap(currentView);
  map.setView([s.lat,s.lng],15,{animate:true});
  setTimeout(()=>{const el=document.getElementById('stop-'+i); if(el) el.scrollIntoView({behavior:'smooth',block:'center'});},120);
}

window.addEventListener('DOMContentLoaded',initMap);
</script>
</body>
